services:
  oracle-app:
    build:
      context: .
    image: delphi42:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      DELPHI_LOG_LEVEL: INFO
    command:
      - python
      - -m
      - bot.oracle_bot

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.8.0
    volumes:
      - ./data/library/zim:/data/zim:ro
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        if ls /data/zim/*.zim >/dev/null 2>&1; then
          exec kiwix-serve --port=8080 /data/zim/*.zim;
        fi
        printf 'Mount one or more .zim files under /data/zim to enable Kiwix.\n'
        exec tail -f /dev/null
    ports:
      - "8080:8080"
