node_name: delphi-42-ubuntu-ovms-live

radio:
  transport: meshtastic
  # Replace this with the actual Linux device path for the attached T114, for example:
  # /dev/ttyACM0
  device: /dev/ttyACMREPLACE_ME
  channel: 0

privacy:
  answer_public_messages: false
  share_position_publicly: false

broadcasts:
  interval_minutes: 90
  messages:
    - THE ORACLE LISTENS. SEND DM FOR COUNSEL.
    - ASH NODE AWAKE.
    - SEEK WISDOM IN PRIVATE.

knowledge:
  plaintext_dir: data/library/plaintext
  index_path: data/index/oracle-ubuntu-ovms.db
  kiwix_url: http://127.0.0.1:8080
  zim_dir: data/library/zim
  runtime_zim_fallback_enabled: false
  runtime_zim_allowlist:
    - wikipedia_en_medicine_maxi_2023-12.zim
  runtime_zim_search_limit: 3

llm:
  backend: openai-compatible
  provider: ovms
  base_url: http://127.0.0.1:8000/v3
  # Replace this with the exact model id returned by GET /v3/models from OVMS.
  model: replace-with-ovms-model-id
  api_key: sk-
  timeout_seconds: 45

reply:
  short_max_chars: 120
  continuation_max_chars: 600
  max_continuation_packets: 3

wifi:
  ssid: DELPHI-42-OVMS
