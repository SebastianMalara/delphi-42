node_name: delphi-42-ubuntu-ovms-live

radio:
  transport: meshtastic
  # Replace this with the actual Linux device path for the attached T114.
  # Prefer the stable by-id path when available, for example:
  # /dev/serial/by-id/usb-Heltec_HT-n5262_3403206A50AF5C33-if00
  # Fall back to /dev/ttyACM0 or /dev/ttyUSB0 only if by-id is unavailable.
  device: /dev/ttyACMREPLACE_ME
  channel: 0
  text_packet_spacing_seconds: 8.0
  text_packet_retry_attempts: 2
  text_packet_retry_delay_seconds: 15.0
  max_text_payload_bytes: 120

privacy:
  answer_public_messages: false
  share_position_publicly: false

broadcasts:
  interval_minutes: 90
  messages:
    - THE ORACLE LISTENS. SEND DM FOR COUNSEL.
    - ASH NODE AWAKE.
    - SEEK WISDOM IN PRIVATE.

knowledge:
  kiwix_url: http://127.0.0.1:8080
  zim_dir: data/library/zim
  zim_allowlist:
    - medicine.zim
  zim_search_limit: 3

llm:
  backend: openai-compatible
  provider: ovms
  base_url: http://127.0.0.1:8000/v3
  # Replace this with the exact model id returned by GET /v3/models from OVMS.
  model: replace-with-ovms-model-id
  api_key: sk-
  timeout_seconds: 45

reply:
  short_max_chars: 100
  condensed_max_chars: 600
  max_total_packets: 6

wifi:
  ssid: DELPHI-42-OVMS
