node_name: delphi-42-mac-live

radio:
  transport: meshtastic
  # Replace this with the actual macOS device path for the attached T114, for example:
  # /dev/cu.usbmodem1101
  device: /dev/cu.usbmodemREPLACE_ME
  channel: 0
  text_packet_spacing_seconds: 8.0
  text_packet_retry_attempts: 2
  text_packet_retry_delay_seconds: 15.0
  max_text_payload_bytes: 120

privacy:
  answer_public_messages: false
  share_position_publicly: false

broadcasts:
  interval_minutes: 90
  messages:
    - THE ORACLE LISTENS. SEND DM FOR COUNSEL.
    - ASH NODE AWAKE.
    - SEEK WISDOM IN PRIVATE.

knowledge:
  kiwix_url: http://127.0.0.1:8080
  zim_dir: data/library/zim
  zim_allowlist:
    - medicine.zim
  zim_search_limit: 3

llm:
  backend: openai-compatible
  provider: lm-studio
  base_url: http://127.0.0.1:1234/v1
  # Replace this with the exact model id returned by GET /v1/models from LM Studio.
  model: replace-with-lmstudio-model-id
  api_key: lm-studio
  timeout_seconds: 45

reply:
  short_max_chars: 100
  condensed_max_chars: 600
  max_total_packets: 6

wifi:
  ssid: DELPHI-42-MAC
