node_name: delphi-42-mac

radio:
  transport: simulated
  device: ""
  channel: 0
  text_packet_spacing_seconds: 0.0
  text_packet_retry_attempts: 0
  text_packet_retry_delay_seconds: 0.0
  max_text_payload_bytes: 0

privacy:
  answer_public_messages: false
  share_position_publicly: false

broadcasts:
  interval_minutes: 90
  messages:
    - THE ORACLE LISTENS. SEND DM FOR COUNSEL.
    - ASH NODE AWAKE.
    - SEEK WISDOM IN PRIVATE.

knowledge:
  kiwix_url: http://127.0.0.1:8080
  zim_dir: data/library/zim
  zim_allowlist:
    - medicine.zim
    - mdwiki.zim
    - ifixit.zim
    - appropedia.zim
    - wikivoyage.zim
  zim_search_limit: 3

llm:
  backend: openai-compatible
  provider: lm-studio
  base_url: http://127.0.0.1:1234/v1
  # Replace this with the exact model id returned by GET /v1/models from LM Studio.
  model: replace-with-lmstudio-model-id
  api_key: lm-studio
  timeout_seconds: 45

reply:
  short_max_chars: 120
  condensed_max_chars: 600
  max_total_packets: 7
  ask_min_total_packets: 5
  ask_max_total_packets: 7
  chat_min_total_packets: 2
  chat_max_total_packets: 4

wifi:
  ssid: DELPHI-42-MAC
