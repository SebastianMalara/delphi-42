node_name: delphi-42

radio:
  transport: meshtastic
  device: /dev/ttyUSB0
  channel: 0
  text_packet_spacing_seconds: 8.0
  text_packet_retry_attempts: 2
  text_packet_retry_delay_seconds: 15.0
  max_text_payload_bytes: 120

privacy:
  answer_public_messages: false
  share_position_publicly: false

broadcasts:
  interval_minutes: 90
  messages:
    - THE ORACLE LISTENS. SEND DM FOR COUNSEL.
    - ASH NODE AWAKE.
    - SEEK WISDOM IN PRIVATE.

knowledge:
  plaintext_dir: data/library/plaintext
  index_path: data/index/oracle.db
  kiwix_url: http://127.0.0.1:8080
  zim_dir: data/library/zim
  runtime_zim_fallback_enabled: false
  runtime_zim_allowlist:
    - medicine.zim
  runtime_zim_search_limit: 3

llm:
  # OpenAI-compatible local inference boundary. On Pi this usually points to the host
  # M5 StackFlow service; in development it can point to a mock or another compatible host.
  backend: openai-compatible
  provider: stackflow
  base_url: http://127.0.0.1:8000/v1
  model: qwen3-1.7B-Int8-ctx-axcl
  api_key: sk-
  timeout_seconds: 45

reply:
  short_max_chars: 100
  continuation_max_chars: 120
  max_continuation_packets: 3

wifi:
  ssid: DELPHI-42
