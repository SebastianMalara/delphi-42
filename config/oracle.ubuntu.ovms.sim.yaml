node_name: delphi-42-ubuntu-ovms

radio:
  transport: simulated
  device: ""
  channel: 0
  text_packet_spacing_seconds: 0.0
  text_packet_retry_attempts: 0
  text_packet_retry_delay_seconds: 0.0
  max_text_payload_bytes: 0

privacy:
  answer_public_messages: false
  share_position_publicly: false

broadcasts:
  interval_minutes: 90
  messages:
    - THE ORACLE LISTENS. SEND DM FOR COUNSEL.
    - ASH NODE AWAKE.
    - SEEK WISDOM IN PRIVATE.

knowledge:
  kiwix_url: http://127.0.0.1:8080
  zim_dir: data/library/zim
  zim_allowlist:
    - medicine.zim
  zim_search_limit: 3

llm:
  backend: openai-compatible
  provider: ovms
  base_url: http://127.0.0.1:8000/v3
  # Replace this with the exact model id returned by GET /v3/models from OVMS.
  model: replace-with-ovms-model-id
  api_key: sk-
  timeout_seconds: 45

reply:
  short_max_chars: 120
  condensed_max_chars: 600
  max_total_packets: 6

wifi:
  ssid: DELPHI-42-OVMS
