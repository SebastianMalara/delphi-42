  provider: generic
  base_url: http://mock-openai:8000/v1
  model: qwen3-1.7B-Int8-ctx-axcl
  api_key: sk-
  timeout_seconds: 45

reply:
  short_max_chars: 120
  condensed_max_chars: 600
  max_total_packets: 7
  ask_min_total_packets: 5
  ask_max_total_packets: 7
  chat_min_total_packets: 2
  chat_max_total_packets: 4

wifi:
  ssid: DELPHI-42-DEV
